name: smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: mcp/tests/run-all.sh against headless Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chromium (preinstalled on ubuntu-latest, ensure deps)
        run: |
          set -e
          which chromium-browser || which chromium || which google-chrome || true
          # Make sure we have a Chromium-class binary on PATH.
          if ! command -v chromium-browser >/dev/null && ! command -v google-chrome >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y chromium-browser
          fi

      - name: Start headless Chromium with CDP on :9222
        run: |
          set -e
          CHROME=$(command -v google-chrome || command -v chromium-browser || command -v chromium)
          echo "Using browser: $CHROME"
          # --no-sandbox is needed inside GHA's unprivileged container.
          # --headless=new keeps things deterministic.
          "$CHROME" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --remote-debugging-port=9222 \
            --remote-debugging-address=127.0.0.1 \
            --user-data-dir="$RUNNER_TEMP/chrome-profile" \
            about:blank &
          echo $! > "$RUNNER_TEMP/chrome.pid"
          # Wait up to 30s for CDP to come up.
          for i in $(seq 1 60); do
            curl -fsS --max-time 1 http://127.0.0.1:9222/json/version >/dev/null && break
            sleep 0.5
          done
          curl -fsS http://127.0.0.1:9222/json/version

      - name: Install MCP server deps
        working-directory: mcp
        run: npm ci --no-audit --no-fund

      - name: Start auth proxy (MCP_NO_AUTH + skip WSL-only auto-bridge/Chrome)
        run: |
          set -e
          MCP_NO_AUTH=1 \
          MCP_NO_AUTO_CHROME=1 \
          MCP_NO_AUTO_BRIDGE=1 \
          CDP_ENDPOINT=http://127.0.0.1:9222 \
          bash mcp/start.sh &
          echo $! > "$RUNNER_TEMP/proxy.pid"
          # Wait for /healthz.
          for i in $(seq 1 30); do
            curl -fsS --max-time 1 http://127.0.0.1:8931/healthz >/dev/null && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:8931/healthz

      - name: Run regression suite
        env:
          MCP_NO_AUTH: '1'
        run: |
          set -e
          bash mcp/tests/run-all.sh

      - name: Show server log on failure
        if: failure()
        run: |
          echo "--- mcp/logs/playwright-mcp.log (tail 200) ---"
          tail -n 200 mcp/logs/playwright-mcp.log 2>/dev/null || true

      - name: Show /metrics on failure
        if: failure()
        run: |
          curl -fsS http://127.0.0.1:8931/metrics 2>/dev/null || true

      - name: Stop proxy + Chromium
        if: always()
        run: |
          [ -f "$RUNNER_TEMP/proxy.pid" ] && kill "$(cat $RUNNER_TEMP/proxy.pid)" 2>/dev/null || true
          [ -f "$RUNNER_TEMP/chrome.pid" ] && kill "$(cat $RUNNER_TEMP/chrome.pid)" 2>/dev/null || true
