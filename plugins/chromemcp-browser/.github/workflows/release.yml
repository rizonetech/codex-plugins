name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.1.1). Must already exist on a commit.'
        required: true

jobs:
  release:
    name: Build tarball + GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_dispatch needs the right ref; checkout the tag.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag + version
        id: tag
        run: |
          set -e
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG  Version: $VERSION"

      - name: Build release tarball
        run: |
          set -e
          VERSION="${{ steps.tag.outputs.version }}"
          DIR="chromemcp-browser-$VERSION"
          mkdir -p "/tmp/stage/$DIR"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            ./ "/tmp/stage/$DIR/"
          ( cd /tmp/stage && tar -czf "chromemcp-browser-$VERSION.tar.gz" "$DIR" )
          mv "/tmp/stage/chromemcp-browser-$VERSION.tar.gz" .
          ls -lh "chromemcp-browser-$VERSION.tar.gz"

      - name: Generate release notes from CHANGELOG
        id: notes
        run: |
          set -e
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          if grep -q '^## \[Unreleased\]' CHANGELOG.md; then
            awk '/^## \[Unreleased\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md > "$NOTES_FILE"
          else
            echo "See CHANGELOG.md for details." > "$NOTES_FILE"
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "chromemcp-browser ${{ steps.tag.outputs.tag }} — see CHANGELOG.md." > "$NOTES_FILE"
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          gh release create "$TAG" \
            --title "chromemcp-browser $TAG" \
            --notes-file "${{ steps.notes.outputs.path }}" \
            --draft \
            "chromemcp-browser-$VERSION.tar.gz"
          echo ""
          echo "Draft release created. Visit the repo's Releases page to publish."
